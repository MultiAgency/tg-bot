name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only check job — least privilege for the default GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Full gate: typecheck, build, then all four demo suites (core-demo,
      # demo, queue-demo, edge-demo) — service-layer edge cases, the end-to-end
      # bot loop, queue delivery semantics, and the adversarial edges (Telegram
      # size limits, group privacy, erasure races, backups). Each drives real
      # code with a stubbed network and a throwaway database; the npm scripts
      # set their own dummy env, so no real token or AI key is needed.
      - run: npm test
