name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only check job — least privilege for the default GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Real Postgres, matching production. The demos reset a scratch schema per run.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: multiagency
          POSTGRES_PASSWORD: multiagency
          POSTGRES_DB: multiagency_test
        ports:
          - 5455:5432
        options: >-
          --health-cmd "pg_isready -U multiagency -d multiagency_test"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      # The demo scripts read TEST_DATABASE_URL (never the dev DATABASE_URL) so
      # their DROP SCHEMA reset can only ever hit this throwaway CI database.
      TEST_DATABASE_URL: postgresql://multiagency:multiagency@localhost:5455/multiagency_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Full gate: typecheck (bot + web), build, then every demo/smoke suite
      # (dao-check, core-demo, demo, queue-demo, edge-demo, rooms-demo,
      # agent-tools-demo, dao-demo, web-smoke) — service-layer edge cases, the
      # end-to-end bot loop, queue delivery semantics, adversarial edges
      # (Telegram size limits, group privacy, erasure races), rooms/signal
      # detection, the agent's tool guards, the DAO-push settlement walk (RPC
      # stubbed), and the Mini App tier. Each drives real code against the
      # Postgres service above, with a stubbed network and a per-run scratch
      # schema; the npm scripts set their own dummy env, so no real token or AI
      # key is needed. (Live-NEAR positive paths — a real payout-account set,
      # the OutLayer submit — are not in the gate at all; they live in the
      # hand-run dao-*-live scripts. See README's coverage note.)
      - run: npm test
