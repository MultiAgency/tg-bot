<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>MultiAgency</title>
    <!-- Empty favicon: the page lives in Telegram's webview (no tab icon), so this
         only suppresses the browser's automatic /favicon.ico request (a 404). -->
    <link rel="icon" href="data:," />
    <!-- Telegram Mini App bridge: exposes window.Telegram.WebApp (initData, theme, haptics).
         The one deliberate third-party load — the bridge must come from telegram.org.
         Fonts are self-hosted (see styles.css) so no other host sees the user. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
